# ============================================================================
# Lead Pipeline — Deploy on merged PR to `main`
# ============================================================================
# Required GitHub Secrets:
#   VPS_HOST           — Server IP or hostname
#   VPS_USER           — SSH username
#   VPS_SSH_KEY        — Full SSH private key (PEM format)
#   VPS_SSH_PASSPHRASE — Passphrase for the SSH private key
#   VPS_KNOWN_HOSTS    — Output of `ssh-keyscan $VPS_HOST`
#   DEPLOY_ENV_FILE    — Full .env file content for the server
# ============================================================================

name: Deploy Lead Pipeline

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: deploy-leads-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Quality gate
  # ──────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint & syntax check
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Syntax check
        run: python -m compileall src/ -q

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Deploy to server via SSH
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    needs: quality
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_PASSPHRASE: ${{ secrets.VPS_SSH_PASSPHRASE }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          eval "$(ssh-agent -s)"
          DISPLAY=:0 SSH_ASKPASS_REQUIRE=force SSH_ASKPASS=$(mktemp) \
            bash -c "echo '#!/bin/sh
          echo \"$SSH_PASSPHRASE\"' > \$SSH_ASKPASS && chmod +x \$SSH_ASKPASS && ssh-add ~/.ssh/deploy_key"

          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

          echo "${{ secrets.VPS_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        env:
          DEPLOY_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: leads-backend
          DEPLOY_ENV_CONTENT: ${{ secrets.DEPLOY_ENV_FILE }}
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=yes ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          echo "::group::Sync code to server"
          rsync -azP --delete --no-group --no-owner \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='.env' \
            --exclude='.mypy_cache' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            --exclude='tests/' \
            -e "ssh -o StrictHostKeyChecking=yes" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${DEPLOY_PATH}/"
          echo "::endgroup::"

          echo "::group::Write environment file"
          printf '%s\n' "$DEPLOY_ENV_CONTENT" | ${SSH_CMD} "cat > ${DEPLOY_PATH}/.env"
          echo "::endgroup::"

          echo "::group::Build and deploy containers"
          ${SSH_CMD} << 'DEPLOY_EOF'
            set -euo pipefail
            cd ~/leads-backend

            echo ">> Building images..."
            docker compose -f docker-compose.prod.yml build --no-cache

            echo ">> Running database migrations..."
            docker compose -f docker-compose.prod.yml run --rm migrate

            echo ">> Starting services..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

            echo ">> Waiting for services to stabilize..."
            sleep 30

            echo ">> Pruning old images..."
            docker image prune -f
          DEPLOY_EOF
          echo "::endgroup::"

      - name: Post-deploy health check
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=yes ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"

          echo "Checking health endpoint (retrying up to 60s)..."
          HEALTH_OK=false
          for i in $(seq 1 12); do
            if ${SSH_CMD} "curl -sf http://localhost:8087/api/v1/health" > /dev/null 2>&1; then
              echo "Health check passed on attempt $i."
              HEALTH_OK=true
              break
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

          if [ "$HEALTH_OK" != "true" ]; then
            echo "::warning::Health check did not pass after 60s — containers may still be starting."
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | main |" >> $GITHUB_STEP_SUMMARY
          echo "| **PR** | #${{ github.event.pull_request.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Health** | http://${{ secrets.VPS_HOST }}:8087/api/v1/health |" >> $GITHUB_STEP_SUMMARY
